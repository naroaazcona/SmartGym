<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartGym · Reservas y entrenamiento</title>
  <meta name="description" content="Reserva clases, consulta el aforo en tiempo real y obtén tu plan de entrenamiento personalizado con IA." />
  <meta name="theme-color" content="#ff5b2e" />

  <!-- Open Graph -->
  <meta property="og:title" content="SmartGym" />
  <meta property="og:description" content="Reserva clases y entrena más inteligente." />
  <meta property="og:type" content="website" />

  <!-- Favicon SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ff5b2e'/%3E%3Ctext x='16' y='22' font-family='system-ui,sans-serif' font-size='16' font-weight='700' fill='white' text-anchor='middle'%3ESG%3C/text%3E%3C/svg%3E" />

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Skeleton inicial para evitar pantalla en blanco -->
    <div style="min-height:100vh; display:flex; flex-direction:column;">
      <div style="height:72px; margin:10px 12px; border-radius:18px; background:rgba(255,255,255,0.7); border:1px solid rgba(13,26,45,0.08);"></div>
      <div style="padding:24px 16px; display:flex; flex-direction:column; gap:16px; max-width:1600px; margin:0 auto; width:100%;">
        <div style="height:22px; width:160px; border-radius:8px; background:linear-gradient(90deg,rgba(200,210,228,.45) 25%,rgba(220,228,242,.7) 50%,rgba(200,210,228,.45) 75%); background-size:600px 100%; animation:sgShimmer 1.4s ease infinite;"></div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px;">
          ${[1,2,3].map(() => `<div style="height:200px; border-radius:14px; background:rgba(247,249,252,0.85); border:1px solid rgba(13,26,45,0.08); animation:sgShimmer 1.4s ease infinite; background:linear-gradient(90deg,rgba(200,210,228,.45) 25%,rgba(220,228,242,.7) 50%,rgba(200,210,228,.45) 75%); background-size:600px 100%;"></div>`).join('')}
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
